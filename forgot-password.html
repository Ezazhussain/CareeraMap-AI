<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password | CareerMap AI</title>

    <link rel="icon" href="assets/img/icon/logo.png">

    <link rel="stylesheet" href="assets/css/forgot-password.css">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
    <div class="forgot-page">

        <!--Background-->
        <div class="orbit orbit1"></div>
        <div class="orbit orbit2"></div>
        <div class="orbit orbit3"></div>

        <!--Left Icons-->
        <div class="left-icons">
            <img src="assets/img/html-5.svg" class="floating html">
            <img src="assets/img/css-3.svg" class="floating css">
            <img src="assets/img/js.svg" class="floating js">
            <img src="assets/img/react.svg" class="floating react">
        </div>

        <!-- Right Icons -->
        <div class="right-icons">
            <img src="assets/img/node.svg" class="floating node">
            <img src="assets/img/firebase.svg" class="floating firebase">
            <img src="assets/img/git.svg" class="floating git">
        </div>

        <!--card-->
        <div class="forgot-card">
            <img src="assets/img/icon/logo.png"
                class="logo"
                alt="CareerMap AI">
            
            <h1>
                Forgot Password?
            </h1>

            <p>
                Enter your registered email address.
                We'll send you a password reset link.
            </p>

            <form id="forgoForm">
                <div class="input-group">
                    <label>Email Address</label>

                    <input id="email"
                        type="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <button id="resetBtn"
                        class="reset-btn"
                        type="submit">
                    Send Reset Link
                </button>
            </form>

            <a href="login.html"
                class="back-login">
                ← Back to Login
            </a>
        </div>
    </div>
    <script type="module" src="assets/js/forgot-password.js"></script>
</body>
</html>
